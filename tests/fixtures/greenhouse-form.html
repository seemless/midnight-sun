<!-- Simplified Greenhouse job application form -->
<html>
<body>
<form id="application-form">
  <div>
    <label for="first_name">First Name *</label>
    <input type="text" id="first_name" name="first_name" />
  </div>
  <div>
    <label for="last_name">Last Name *</label>
    <input type="text" id="last_name" name="last_name" />
  </div>
  <div>
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" />
  </div>
  <div>
    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" />
  </div>
  <div>
    <label for="location">Location (City)</label>
    <input type="text" id="location" name="location" />
  </div>
  <div>
    <label for="resume">Resume/CV</label>
    <input type="file" id="resume" name="resume" />
  </div>
  <div>
    <label for="linkedin_profile">LinkedIn Profile</label>
    <input type="text" id="linkedin_profile" name="linkedin_profile" />
  </div>
  <div>
    <label for="github_url">GitHub URL</label>
    <input type="text" id="github_url" name="github_url" />
  </div>
  <div>
    <label for="website">Website</label>
    <input type="text" id="website" name="website" />
  </div>
  <div>
    <label for="cover_letter">Cover Letter</label>
    <textarea id="cover_letter" name="cover_letter" rows="4"></textarea>
  </div>
  <div>
    <label for="salary_expectation">Salary Expectation</label>
    <input type="text" id="salary_expectation" name="salary_expectation" />
  </div>
  <div>
    <label for="work_authorization">Are you authorized to work in the US?</label>
    <select id="work_authorization" name="work_authorization">
      <option value="">Select...</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select>
  </div>
  <div>
    <label for="sponsorship">Do you require visa sponsorship?</label>
    <select id="sponsorship" name="sponsorship">
      <option value="">Select...</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select>
  </div>
  <button type="submit">Submit Application</button>
</form>
</body>
</html>
